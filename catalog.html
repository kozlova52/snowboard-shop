<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Каталог - Сноуборд-шоп</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--  Меню сайта  -->
    <ul class="menu">
        <li><a href="index.html">Главная</a></li>
        <li><a href="catalog.html">Каталог</a></li>
    </ul>
   
    <hr>

    <!-- Заголовок  -->
    <h2>Каталог</h2>

    <!-- ФИЛЬТР -->
    <select id="filter">
        <option value="all">Все</option>
        <option value="boards">Сноуборды</option>
        <option value="boots">Ботинки</option>
        <option value="bindings">Крепления</option>
    </select>

    <!-- ТОВАР 1 -->
    <div class="product" data-name="Сноуборд" data-price="29990" data-category="boards">
        <h3>Сноуборд</h3>
        <p><strong>Цена:</strong> 29 990 ₽</p>
        <img src="images/board.jpg" alt="Сноуборд" width="150" height="150">
        <p><a href="board.html">Подробнее о доске</a></p>
        <button class="add-btn">Добавить в корзину</button>
    </div>

    <!-- ТОВАР 2 -->
    <div class="product" data-name="Ботинки" data-price="19500" data-category="boots">
        <h3>Ботинки</h3>
        <p><strong>Цена:</strong> 19 500 ₽</p>
        <img src="images/boots.webp" alt="Ботинки" width="150" height="150">
        <p><a href="boots.html">Подробнее о ботинках</a></p>
        <button class="add-btn">Добавить в корзину</button>
    </div>

    <!-- ТОВАР 3 -->
    <div class="product" data-name="Крепления" data-price="22990" data-category="bindings">
        <h3>Крепления</h3>
        <p><strong>Цена:</strong> 22 990 ₽</p>
        <img src="images/bindings.jpg" alt="Крепления" width="150" height="150">
        <p><a href="bindings.html">Подробнее о креплениях</a></p>
        <button class="add-btn">Добавить в корзину</button>
    </div>

    <hr>

    <!-- КОРЗИНА -->
    <h2>Корзина</h2>
    <ul id="cart-list"></ul>
    <p id="total">Итого: 0</p>

    <button id="clear-cart">Очистить корзину</button>
    <button id="pay">Оплатить</button>

    <hr>

    <!-- Подвал -->
    <p>&copy; 2026 Магазин "Кант". Все права защищены.</p>

    <script src="script.js"></script>
</body>
</html>
